name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate_tests:
    name: gate_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  gate_coverage:
    name: gate_coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run coverage gate
        run: npm run test:coverage:ci

  gate_chaos:
    name: gate_chaos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run chaos gate
        run: npm run test:chaos

  e2e_browser:
    name: e2e_browser
    runs-on: ubuntu-latest
    # Prod-payments gate only: keep job defined/runnable, but non-blocking for dev by default.
    if: ${{ vars.CI_GATING_PROFILE == 'prod-payments' }}
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Run browser E2E tests (Chromium)
        run: npm run test:e2e:browser
      - name: Write e2e browser proof
        if: ${{ success() }}
        run: |
          cat > e2e_browser_proof.json <<EOF
          {
            "repo": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "job": "${GITHUB_JOB}",
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "command": "npm run test:e2e:browser",
            "result": "pass"
          }
          EOF
      - name: Upload e2e browser proof artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e_browser_proof
          path: e2e_browser_proof.json
          retention-days: 14
  catalogue_smoke:
    name: catalogue_smoke
    runs-on: ubuntu-latest
    if: ${{ contains(vars.CI_GATING_PROFILE, 'catalogue') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Run catalogue smoke proof
        run: npm run smoke:catalogue:v1
      - name: Upload epic5 catalogue smoke proof artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: epic5_catalogue_smoke_proof
          path: docs/audit/artifacts/epic5_catalogue_smoke_proof.*.json
          retention-days: 14

  epic5_1c_verify:
    name: epic5_1c_verify
    runs-on: ubuntu-latest
    if: ${{ contains(vars.CI_GATING_PROFILE, 'catalogue') }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insidex_clean
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d insidex_clean"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: EPIC-5.1C verification
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/insidex_clean?schema=public
          NODE_ENV: development
        run: |
          npm run prisma:generate
          npm run prisma:migrate
          npm run prisma:seed
          npm run epic:5.1c:verify
      - name: Write EPIC-5.1C proof artifact
        if: ${{ success() }}
        run: |
          mkdir -p docs/audit/artifacts
          SHORT_SHA="${GITHUB_SHA::8}"
          PROOF_PATH="docs/audit/artifacts/epic5_1c_ci_verify_proof.${SHORT_SHA}.json"
          cat > "${PROOF_PATH}" <<EOF
          {
            "repo": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "job": "${GITHUB_JOB}",
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "command": "npm run epic:5.1c:verify",
            "result": "pass"
          }
          EOF
      - name: Upload EPIC-5.1C proof artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: epic5_1c_ci_verify_proof
          path: docs/audit/artifacts/epic5_1c_ci_verify_proof.*.json
          retention-days: 14